# 应用配置示例文件
# 复制此文件为 application.yml 并填写真实配置

server:
  port: 8080

spring:
  application:
    name: autoCodeWorkspace

langchain4j:
  open-ai:
    chat-model:
      api-key: your_deepseek_api_key_here  # ⚠️ 请替换为你的 DeepSeek API Key
      base-url: https://api.deepseek.com/v1
      model-name: deepseek-chat

app:
  json:
    storage:
      path: ./data/json
    calender:
      path: ./data/calender

# Server 酱微信推送配置
# 获取 SendKey: https://sct.ftqq.com/sendkey
serverchan:
  # ⚠️ 请替换为你的 Server 酱 SendKey

# 飞书机器人配置
# 获取 App ID 和 App Secret: https://open.feishu.cn/app
feishu:
  app-id: ${FEISHU_APP_ID:}  # 飞书 App ID，环境变量 FEISHU_APP_ID
  app-secret: ${FEISHU_APP_SECRET:}  # 飞书 App Secret，环境变量 FEISHU_APP_SECRET

notification:
  enabled-channels: serverchan,notifyme,feishu
  serverchan:
    sckey: ${SERVERCHAN_SENDKEY:}
  notifyme:
    uuid: ${NOTIFYME_UUID:}
    base-url: https://notifyme-server.wzn556.top/?
  feishu:
    webhook-url: ${FEISHU_WEBHOOK_URL:}

# 洛克王国远行商人配置
roco:
  rocom-api-key: ${ROCOM_API_KEY:}  # 游戏API密钥，环境变量 ROCOM_API_KEY
  imgbb-key: ${IMGBB_API_KEY:}  # 图床API密钥，环境变量 IMGBB_API_KEY
  notifyme-uuid: ${NOTIFYME_UUID:}  # Notify.me UUID
  cron: "0 5 8,12,16,20 * * ?"  # 定时任务cron表达式
