# 应用配置示例文件
# 复制此文件为 application.yml 并填写真实配置

server:
  port: 8080

spring:
  application:
    name: autoCodeWorkspace

langchain4j:
  open-ai:
    chat-model:
      api-key: your_deepseek_api_key_here  # ⚠️ 请替换为你的 DeepSeek API Key
      base-url: https://api.deepseek.com/v1
      model-name: deepseek-chat

app:
  json:
    storage:
      path: ./data/json
    calender:
      path: ./data/calender

# Server 酱微信推送配置
# 获取 SendKey: https://sct.ftqq.com/sendkey
serverchan:
  # ⚠️ 请替换为你的 Server 酱 SendKey

# 飞书机器人配置
# 获取 App ID 和 App Secret: https://open.feishu.cn/app
feishu:
  app-id: your_feishu_app_id_here  # ⚠️ 请替换为你的飞书应用 App ID
  app-secret: your_feishu_app_secret_here  # ⚠️ 请替换为你的飞书应用 App Secret
