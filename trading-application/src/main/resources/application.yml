server:
  port: 8080

spring:
  application:
    name: autoCodeWorkspace
  
  # SQLite数据库配置
  datasource:
    # Windows路径示例: jdbc:sqlite:D:/codes/stock.db 或 jdbc:sqlite:D:\\codes\\stock.db
    # Linux路径示例: jdbc:sqlite:/root/stock_dir/db/stock.db
    url: jdbc:sqlite:/root/stock_dir/db/stock.db
    driver-class-name: org.sqlite.JDBC

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: icu.iseenu.stock.entity
  configuration:
    map-underscore-to-camel-case: true  # 下划线转驼峰
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 打印SQL日志
  global-config:
    db-config:
      id-type: auto  # 主键自增
      logic-delete-field: deleted  # 逻辑删除字段
      logic-delete-value: 1  # 已删除
      logic-not-delete-value: 0  # 未删除

langchain4j:
  open-ai:
    chat-model:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: https://api.deepseek.com/v1
      model-name: deepseek-chat
      # 禁用 DeepSeek 的思考模式，避免 reasoning_content 错误
      extra-params:
        enable_thinking: false

app:
  json:
    storage:
      path: ./data/json
    calender:
      path: ./data/calender
  # RAG配置
  rag:
    auto-load: true  # 应用启动时自动加载节假日数据到向量库

# 飞书机器人配置
feishu:
  app-id: ${FEISHU_APP_ID:}  # 飞书 App ID，可选
  app-secret: ${FEISHU_APP_SECRET:}  # 飞书 App Secret，可选

notification:
  enabled-channels: serverchan,notifyme,feishu
  serverchan:
    sckey: ${SERVERCHAN_SENDKEY}
  notifyme:
    uuid: ${NOTIFYME_UUID}
    base-url: https://notifyme-server.wzn556.top/?
  feishu:
    webhook-url: ${FEISHU_WEBHOOK_URL:}

# 洛克王国远行商人配置
roco:
  rocom-api-key: ${ROCOM_API_KEY:}  # 游戏API密钥，环境变量 ROCOM_API_KEY
  imgbb-key: ${IMGBB_API_KEY:}  # 图床API密钥，环境变量 IMGBB_API_KEY
  notifyme-uuid: ${NOTIFYME_UUID:}  # Notify.me UUID
  cron: "0 5 8,12,16,20,22 * * ?"  # 定时任务cron表达式
  # 家园种植监控
  farm-uids:
    - 503689802
  farm-cron: "0 0 * * * ?"  # 每小时整点执行
