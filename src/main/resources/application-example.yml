# 应用配置示例文件
# 复制此文件为 application.yml 并填写真实配置

server:
  port: 8080

spring:
  application:
    name: autoCodeWorkspace

langchain4j:
  open-ai:
    chat-model:
      api-key: your_deepseek_api_key_here  # ⚠️ 请替换为你的 DeepSeek API Key
      base-url: https://api.deepseek.com/v1
      model-name: deepseek-chat

app:
  json:
    storage:
      path: ./data/json
    calender:
      path: ./data/calender

# Server 酱微信推送配置
# 获取 SendKey: https://sct.ftqq.com/sendkey
serverchan:
  sendkey: your_serverchan_sendkey_here  # ⚠️ 请替换为你的 Server 酱 SendKey
